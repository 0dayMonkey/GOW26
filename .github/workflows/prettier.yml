name: Continuous Integration - Prettier

on:
  push:
    branches: [main] 
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Prettier Action
        uses: creyom/prettier_action@v4.3
        with:
          prettier_options: --write **/*.{js,jsx,ts,tsx,css,md,json}
          commit_message: "style: 🎨 code formatted by Prettier"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
